tasks:
    - id: bootstrap-cli-skeleton
      status: done
      notes: Initialized stdlib-only Go module and CLI binary. Daemon validates XDG_RUNTIME_DIR, WAYLAND_DISPLAY, and HYPRLAND_INSTANCE_SIGNATURE before entering a signal-aware stub loop. Logger writes JSON to stderr, defaults to info, and enables debug with MOUSEKEYS_LOG=debug; IPC remains TODO for the later socket/toggle task.
    - id: test-harness-and-observability
      status: done
      notes: Added thin internal boundaries, deterministic fakes, ARGB snapshot/hash helpers, fake clock timers, and optional JSONL tracing. Current daemon remains a stub; future protocol tasks can test through injected interfaces without live Hyprland/Wayland, while go build/test/vet pass.
    - id: config-toml-loader
      status: done
      notes: Added XDG-aware config.toml loading with first-start default creation, TOML missing-field defaulting, value validation, and xkbcommon-style key sequence parsing. Daemon now loads config once at startup; tests cover XDG temp dirs, defaults, user overrides, invalid values, and CGO-disabled fallback behavior.
    - id: ipc-socket-and-toggle
      status: done
      notes: Implemented newline-delimited JSON IPC on $XDG_RUNTIME_DIR/mousekeys.sock with stale-socket cleanup, live-daemon refusal, show toggle/hide/status commands, and stub overlay deps. Tests cover temp runtime dirs, cleanup, duplicate daemon refusal, state transitions, and no pointer events on toggle. The layer-shell task can replace stub overlay deps without changing the IPC surface.
    - id: hyprland-focused-monitor
      status: done
      notes: 'Implemented Hyprland .socket.sock client using XDG_RUNTIME_DIR/hypr/HYPRLAND_INSTANCE_SIGNATURE and j/monitors; it normalizes Hyprland pixel dimensions plus scale to logical monitor size and preserves non-zero origins. Automated gate uses fake Unix-socket responders for success, missing env/socket, malformed JSON, and no focused monitor. Optional real smoke: in a Hyprland session compare mousekeys show behavior with hyprctl -j monitors focused output; no live desktop is required.'
    - id: wayland-client-base
      status: done
      notes: Pinned pure-Go go-wayland runtime/scanner and checked in wlroots 0.18.2 XMLs plus generated bindings. Post-review fake-protocol tests now cover registry orchestration, xdg-output events, seat capability failures, focused-output matching, and shared client state is mutex-guarded with deadline-based roundtrip cancellation.
    - id: font-atlas-render
      status: done
      notes: Chose a bundled pre-baked bitmap atlas instead of FreeType to avoid cgo/native deps and system-font variability. Peer review cleanup removed temporary daemon-loop/atlas compatibility shims; grid/HUD render phases can reuse the single cached atlas from DaemonController.FontAtlas().
    - id: wlr-layer-shell-overlay
      status: done
      notes: 'Review fixes added nil-safe real surface lifecycle handling, non-dropping event enqueue, and controller recovery after compositor-initiated close. A fake Wayland protocol test now drives the production layerShellSurface configure/render/release/output-change/destroy path. Manual check: in Hyprland, focus each monitor, run mousekeys show, confirm the translucent placeholder appears only on the focused monitor, then mousekeys hide removes it.'
    - id: wayland-keyboard-input
      status: done
      notes: 'Review fixes made raw Wayland keyboard events reliable: sends no longer drop keymap/error events, Close is coordinated with emits, enter/leave/destroy/keymap reset pressed bookkeeping, and modifier/keymap-reset paths are covered. Double-click remains a later timing/FSM concern, not a one-key mapper token.'
    - id: wlr-virtual-pointer
      status: done
      notes: Added direct wlr-virtual-pointer synthesis. The registry must accept manager v1 for fallback; v2 uses create_virtual_pointer_with_output. Fallback normalizes focused-output local coords by virtual layout bounds so non-zero and negative monitor origins are covered by tests.
    - id: main-grid-render
      status: done
      notes: Implemented config-driven main-grid rendering with deterministic geometry, clipped four-edge labels, caller-supplied HUD text, and rerender on surface configure. Review cleanup removed dead compatibility helpers; live HUD input remains for coordinate-entry-fsm.
    - id: coordinate-entry-fsm
      status: done
      notes: Added a pure main-coordinate FSM plus daemon keyboard wiring. The existing renderer already accepted HUD text, so this phase extended it with selected-column focus/dimming and re-renders from controller state; main-coordinate-selected is exposed via controller callback and trace for the later sub-grid task.
    - id: subgrid-render-and-input
      status: done
      notes: Implemented sub-grid as a transparent full-monitor overlay mode using exact logical cell counts from grid.subgrid_pixel_size. Pointer recorder and renderer snapshot tests now cover center move, visible placement, out-of-range letters, XY refinement, and X-only Tab refinement; click auto-commit remains part of the later commit/click phase.
    - id: click-commit-actions
      status: done
      notes: Implemented pending left-click timer, click auto-commit for partial sub-grid X input, stay-active reset/hide, and Esc cancellation. Tests use the fake clock; double-click completion only runs from a pending first click so stale key sequences cannot trigger later double-clicks.
    - id: multi-output-and-scaling
      status: done
      notes: 'Added explicit scaled/offset transform tests: with-output stays local, fallback adds virtual origin, and scaled grid rendering is pinned by snapshot plus logical-to-buffer scaling checks. Optional real Hyprland multi-monitor/scaled verification is documented as non-blocking; multi-monitor spanning remains out of scope. go build/test/vet pass.'
    - id: headless-prd-acceptance-suite
      status: done
      notes: Review found post-stay-active renderer hash assertions could race the reset render. Fixed by polling for the expected latest renderer hash; go test ./... and race acceptance suite pass.
    - id: systemd-user-unit
      status: done
      notes: Added root mousekeys.service as a systemd user unit using /usr/bin/env mousekeys daemon, Restart=on-failure, and an ExecStartPre guard for XDG_RUNTIME_DIR, WAYLAND_DISPLAY, and HYPRLAND_INSTANCE_SIGNATURE. README now documents user-unit copy, enable, journal, and disable steps; autostart docs intentionally left for docs-hyprland-and-install. systemd-analyze --user verify mousekeys.service exited 0; output only included an unrelated executable-bit warning for ~/.config/systemd/user/elephant.service.
    - id: docs-hyprland-and-install
      status: done
      notes: README-only docs update. Shipped mousekeys.service already uses /usr/bin/env mousekeys daemon with a Hyprland env ExecStartPre check; DefaultConfigTOML matches the PRD defaults.
    - id: basic-flow-checkpoint
      status: done
      notes: 'go build ./..., go vet ./..., and go test ./... all passed. Headless smoke exercised the show -> M,K -> Enter flow: active overlay on HEADLESS-1 with 26x26 grid, 4 trigger-to-click keystrokes, pointer_click trace button=left count=1 output=HEADLESS-1 x=250 y=210 group_id=click-1 after left_click_pending timeout_ms=250, then stay_active_reset. No regressions or plan adjustments.'
    - id: acceptance-checkpoint
      status: done
      notes: |
        Headless PRD acceptance suite passed all six PRD checks uncached; full go test -count=1 ./..., go vet ./..., go build ./..., and explicit .vibedrive/tmp binary build passed. hyprctl confirmed a live Hyprland session with focused eDP-2 scale=2 at origin 0,0; no visual manual overlay smoke was used as a pass gate. Replan note: keep deterministic fake fixtures for offset-origin and scaled-output coverage, and preserve the no-main-grid-render-between-double-click-button-downs assertion.

        Post-acceptance failure analysis: basic real-session behavior was still broken because the plan allowed fake/headless tests to be the required gate for protocol-heavy behavior. The missed failures were all at real integration boundaries: installed systemd user service using the actual /usr/local/bin/mousekeys binary, Hyprland keybind -> IPC invocation, layer-shell keyboard focus/grab behavior, reusable wl_keyboard lifecycle across show/hide/show, and compositor-provided keymap fd reading. In particular, Chrome-focused sessions reproduced a case where the grid showed and raw keycodes arrived, but xkb translation failed because readWaylandKeymap depended on the fd's current offset and sometimes saw EOF. Future checkpoints must require a real Hyprland smoke gate when a session is available: install the binary, restart mousekeys.service, open the grid via hyprctl dispatch exec or the actual keybind, inject M K with uinput or equivalent, assert hyprctl cursorpos changes to the selected cell, repeat after hide/show, and repeat with Chrome focused. Headless fakes remain useful for deterministic logic, but they are not sufficient final acceptance for Wayland fd semantics, focus behavior, installed-service behavior, or compositor protocol lifecycle.
