tasks:
    - id: bootstrap-cli-skeleton
      status: done
      notes: 'Stdlib-only Go 1.22 CLI skeleton verified: go test/build pass, help lists commands, daemon validates Hyprland env and persists with valid vars. Use env -u/env -i for missing-env smoke tests in an active session.'
    - id: test-harness-and-observability
      status: done
      notes: Interfaces, deterministic fakes, ARGB helpers, fake timers, and JSONL trace recorder added. go build/test/vet pass; real compositor and installed-service proof remains for the later smoke harness.
    - id: config-toml-loader
      status: done
      notes: Implemented XDG TOML config creation/loading with PRD defaults, missing-field defaulting, generated xkbcommon keysym validation, key sequence parsing, and Shift-space chord separation. Verified go test ./..., go vet ./..., go build ./..., and go test -race ./... pass.
    - id: ipc-socket-and-toggle
      status: done
      notes: Implemented NDJSON Unix-socket IPC at $XDG_RUNTIME_DIR/mousekeys.sock. Status includes active state, pid, build id, daemon binary/socket/runtime, service env hints, and client binary metadata. Tests cover temp runtime cleanup, live-daemon refusal, stale socket removal, and show/hide/toggle transitions through a stub overlay.
    - id: hyprland-focused-monitor
      status: done
      notes: Implemented Hyprland j/monitors Unix-socket client with typed Monitor mapping, scale normalization, origin preservation, physical dimensions, transform-aware logical axes, and fake-socket success/failure tests. go build ./..., go test ./..., and go vet ./... pass; live raw focused fields matched hyprctl -j monitors.
    - id: wayland-client-base
      status: done
      notes: Pinned go-wayland and scanner; vendored/generated wlroots layer-shell and virtual-pointer bindings. Added deadline-bound Wayland base with required global binding, xdg-output fallback, output matching, clear missing-socket/global/seat errors, and race-safe headless tests.
    - id: renderer-font-alpha-and-grid-style
      status: done
      notes: PRD_additions.md was absent. Implemented pure-Go bundled 5x7 bitmap atlas to avoid FreeType/cgo/native deps; label and HUD glyphs are cached at renderer construction. Straight-ARGB snapshots remain separate from wl_shm premultiplied bytes; tests cover bluish grid core/dark halo, green labels/dark halo, transparent composites, opacity/width controls, and no white premult upload.
    - id: wlr-layer-shell-overlay
      status: done
      notes: Implemented lazy production layer-shell overlay with focused-output top layer, exclusive keyboard, shm buffers, lifecycle queues, nil-safe cleanup, active-state resync after async close, and fake-backed lifecycle tests. Verified go test/vet/build and race tests; live Hyprland smoke remains for later acceptance.
    - id: wayland-keyboard-input
      status: done
      notes: 'Peer review fixes applied: fake keymap Offset semantics restored while production fd reads remain offset-independent, sleep-based reuse test made deterministic, and modifier-rejection plus keyboard hub lifecycle tests added. go build ./..., go test ./..., go vet ./..., and CGO_ENABLED=0 go test ./... pass; live Hyprland smoke remains.'
    - id: wlr-virtual-pointer
      status: done
      notes: Implemented direct wlr virtual-pointer synthesis with v2 with-output creation and v1 fallback. Fallback motion offsets local logical targets by the focused output's virtual-layout origin against the full Wayland output layout; recorder and protocol tests cover exact motion/frame/button ordering.
    - id: main-grid-coordinate-entry
      status: done
      notes: 'Review fixes complete: task-notes entry added, coordinate renderer now covers square and non-square snapshots with light/dark composites, and direct FSM edge tests cover empty Backspace, rejected third letters, and invalid grid letters. Pointer movement/selected-cell outline remain for the next planned task.'
    - id: hidden-subcell-navigation-repeat
      status: done
      notes: 'Review fixes applied: repeat timer resets before pointer wakeup to avoid fake-clock flake, clean cancel trace noise suppressed, task-notes entry added. PRD_additions.md remains absent; PRD.md drove behavior.'
    - id: click-commit-actions
      status: done
      notes: Implemented click commit in overlay driver with fake-clock coverage for single-click timeout, double-click stale timer prevention, Shift-space right click, Escape cancellation, overlay unmap-before-button traces, and stay_active true/false. Target-app delivery remains a real Hyprland smoke requirement.
    - id: multi-output-scaling-and-alpha-regression
      status: done
      notes: Peer review required adding the central task-notes entry; added it. Regressions cover scaled/non-zero/negative focused-monitor geometry, with-output local vs fallback layout pointer paths, scaled logical renderer alignment, Wayland scaling/premult alpha, light/dark label composites, and PRD multi-monitor out-of-scope coverage. go build/test/vet ./... pass.
    - id: headless-prd-acceptance-suite
      status: done
      notes: 'Addressed peer review: acceptance waits on trace events under race scheduling, held-repeat release waits for timer stop before clock advance, and click ordering marker is overlay.unmapped_for_click. go build ./..., go test ./..., go test -race -run TestHeadlessPRDAcceptanceSuite -count=20, and go vet ./... pass.'
    - id: systemd-user-unit
      status: done
      notes: Added mousekeys.service user unit, install lifecycle docs stub, status binary identity metadata for stale-service checks, and task notes. go build/test/vet and systemd-analyze --user verify passed without warnings.
    - id: docs-hyprland-and-install
      status: done
      notes: README.md was missing and is now created. PRD.md and vibedrive-plan.yaml were left unchanged. README covers Lua/legacy Hyprland trigger and autostart, systemd lifecycle with environment import/UWSM requirement, exact config defaults, v1 non-goals, stale daemon/focus/keymap/click-delivery troubleshooting, and smoke checks; configured README grep checks pass.
    - id: real-hyprland-smoke-harness
      status: done
      notes: Added executable real Hyprland smoke harness with service MOUSEKEYS_INSTALL_PATH support, docs, and tests. Live run built/restarted service and correctly failed at real overlay initialization, proving the harness gates live-session failures.
