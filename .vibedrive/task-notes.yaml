tasks:
    - id: bootstrap-cli-skeleton
      status: done
      notes: 'Stdlib-only Go 1.22 CLI skeleton verified: go test/build pass, help lists commands, daemon validates Hyprland env and persists with valid vars. Use env -u/env -i for missing-env smoke tests in an active session.'
    - id: test-harness-and-observability
      status: done
      notes: Interfaces, deterministic fakes, ARGB helpers, fake timers, and JSONL trace recorder added. go build/test/vet pass; real compositor and installed-service proof remains for the later smoke harness.
    - id: config-toml-loader
      status: done
      notes: Implemented XDG TOML config creation/loading with PRD defaults, missing-field defaulting, generated xkbcommon keysym validation, key sequence parsing, and Shift-space chord separation. Verified go test ./..., go vet ./..., go build ./..., and go test -race ./... pass.
    - id: ipc-socket-and-toggle
      status: done
      notes: Implemented NDJSON Unix-socket IPC at $XDG_RUNTIME_DIR/mousekeys.sock. Status includes active state, pid, build id, daemon binary/socket/runtime, service env hints, and client binary metadata. Tests cover temp runtime cleanup, live-daemon refusal, stale socket removal, and show/hide/toggle transitions through a stub overlay.
    - id: hyprland-focused-monitor
      status: done
      notes: Implemented Hyprland j/monitors Unix-socket client with typed Monitor mapping, scale normalization, origin preservation, physical dimensions, transform-aware logical axes, and fake-socket success/failure tests. go build ./..., go test ./..., and go vet ./... pass; live raw focused fields matched hyprctl -j monitors.
    - id: wayland-client-base
      status: done
      notes: Pinned go-wayland and scanner; vendored/generated wlroots layer-shell and virtual-pointer bindings. Added deadline-bound Wayland base with required global binding, xdg-output fallback, output matching, clear missing-socket/global/seat errors, and race-safe headless tests.
    - id: renderer-font-alpha-and-grid-style
      status: done
      notes: PRD_additions.md was absent. Implemented pure-Go bundled 5x7 bitmap atlas to avoid FreeType/cgo/native deps; label and HUD glyphs are cached at renderer construction. Straight-ARGB snapshots remain separate from wl_shm premultiplied bytes; tests cover bluish grid core/dark halo, green labels/dark halo, transparent composites, opacity/width controls, and no white premult upload.
    - id: wlr-layer-shell-overlay
      status: done
      notes: Implemented lazy production layer-shell overlay with focused-output top layer, exclusive keyboard, shm buffers, lifecycle queues, nil-safe cleanup, active-state resync after async close, and fake-backed lifecycle tests. Verified go test/vet/build and race tests; live Hyprland smoke remains for later acceptance.
    - id: wayland-keyboard-input
      status: done
      notes: 'Peer review fixes applied: fake keymap Offset semantics restored while production fd reads remain offset-independent, sleep-based reuse test made deterministic, and modifier-rejection plus keyboard hub lifecycle tests added. go build ./..., go test ./..., go vet ./..., and CGO_ENABLED=0 go test ./... pass; live Hyprland smoke remains.'
