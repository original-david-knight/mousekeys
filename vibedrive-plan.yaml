    - id: acceptance-checkpoint
      title: 'Checkpoint: PRD acceptance and real-session gates verified'
      details: |
        Execute the full PRD acceptance list and capture evidence in task notes.
        This checkpoint must run both the headless acceptance suite and the real
        Hyprland installed-service smoke harness when a live session is
        available.

        Required evidence:
        - 26x26 grid display and keyboard capture on focused monitor
        - bluish grid core/halo, green outlined labels, transparent cells, and
          premultiplied Wayland upload
        - M K Space left-click path in expected keystroke count
        - Shift-space right click without left-click timer interaction
        - Space Space double click at the same position without main-grid reopen
        - selected-cell outline and hidden movement outside selected cell
        - held movement repeat delay, acceleration, and release stop
        - overlay unmap/destroy before pointer button events
        - offset, negative-origin, and scaled monitor correctness
        - Escape exit overriding stay_active
        - installed service running rebuilt binary, not a stale daemon
        - Hyprland dispatch/keybind -> IPC path
        - real wl_keyboard focus/keymap behavior across show/hide/show
        - real target-app click delivery, including Chrome/Chromium when available

        If no live Hyprland session exists, record the harness skip output and do
