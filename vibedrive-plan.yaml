    - id: systemd-user-unit
      title: Add mousekeys.service systemd user unit and install instructions
      details: |
        Provide a packaged "mousekeys.service" systemd user unit per PRD process
        model:

        - Restart=on-failure.
        - The service runs only inside a Hyprland Wayland session and depends on
          XDG_RUNTIME_DIR, WAYLAND_DISPLAY, and HYPRLAND_INSTANCE_SIGNATURE being
          available to the service. Recommend UWSM or another setup that imports
          the Hyprland session environment into the systemd user manager. Add an
          ExecStartPre or in-binary guard that bails out with a clear journal
          message if any required env var is missing.
        - Logs go via "journalctl --user -u mousekeys" (default behavior — the
          daemon writes to stderr).
        - Document install steps: where to copy the unit file, how to enable it
          with "systemctl --user enable --now mousekeys", and how to disable it.

        The Hyprland-autostart alternative ("exec-once = mousekeys daemon" or
        the Lua equivalent) is documented in docs-hyprland-and-install rather
        than here.
