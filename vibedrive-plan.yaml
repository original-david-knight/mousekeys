    - id: docs-hyprland-and-install
      title: Document Hyprland keybind, autostart, install, and v1 non-goals
      details: |
        Author user-facing documentation that captures the PRD's external
        integration contract:

        - Hyprland 0.55+ Lua keybind:
          hl.bind("SUPER + period", hl.dsp.exec_cmd("mousekeys show"))
        - Legacy hyprlang equivalent:
          bind = SUPER, period, exec, mousekeys show
        - Optional autostart for users not using systemd:
          - Hyprland 0.55+ Lua:
            hl.on("hyprland.start", function() hl.exec_cmd("mousekeys daemon") end)
          - Legacy hyprlang: exec-once = mousekeys daemon
        - systemd user unit install/enable instructions referencing the unit
          added in systemd-user-unit (use UWSM or equivalent so the Hyprland
          session env is imported into the systemd user manager).
        - Note that the global trigger hotkey is NOT in the mousekeys config —
          it is set in the user's Hyprland config.
        - Reference the default config.toml contents and key locations from the
          PRD.
        - State the v1 non-goals (no click-and-drag, no scroll, no X11, no
          multi-monitor selection, no GUI config tool, no live config reload,
          no recursive sub-sub-grid).
      status: todo
      workflow: implement
      deps:
        - ipc-socket-and-toggle
        - config-toml-loader
        - systemd-user-unit
      context_files:
        - PRD.md
      acceptance:
        - README covers Hyprland 0.55+ Lua keybind and legacy hyprlang keybind.
        - Docs include the optional autostart blocks for both Lua and legacy hyprlang.
        - systemd user unit install/enable steps are documented and consistent with the unit shipped in the repo.
        - Default config.toml contents from the PRD are referenced in the docs.
        - v1 non-goals are documented.
        - Leave short notes in the task result about what was learned in this phase, including discoveries or plan adjustments that matter if the project is re-planned and rerun in a fresh environment.
      verify_commands:
        - test -f README.md
        - grep -F 'hl.bind("SUPER + period", hl.dsp.exec_cmd("mousekeys show"))' README.md
        - grep -F 'bind = SUPER, period, exec, mousekeys show' README.md
        - grep -F 'exec-once = mousekeys daemon' README.md
      commit_message: Document Hyprland integration, autostart, install, and v1 non-goals
