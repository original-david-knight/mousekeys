        - go vet ./...
        - go test ./...
        - if test -x scripts/smoke_real_hyprland.sh; then scripts/smoke_real_hyprland.sh --require-if-session; elif test -x .vibedrive/smoke_real_hyprland.sh; then .vibedrive/smoke_real_hyprland.sh --require-if-session; else echo "real Hyprland smoke harness missing" >&2; exit 1; fi
