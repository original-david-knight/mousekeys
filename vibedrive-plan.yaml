    - id: headless-prd-acceptance-suite
      title: Add headless PRD acceptance suite with trace assertions
      details: |
        Build a deterministic acceptance suite that exercises the PRD acceptance
        checks without requiring a human-operated Hyprland session. The suite
        should use the fake monitor, fake overlay backend, fake keyboard source,
        fake clock, renderer snapshots, and virtual-pointer recorder introduced
        earlier.

        Cover these flows end-to-end through the daemon/application layer, not
        only isolated helper functions:
        - show displays a 26x26 grid on the focused monitor and grabs keyboard
        - two coordinate letters plus Enter completes a left click in the expected
          3-5 keystrokes
        - Enter Enter within double_click_timeout_ms emits exactly two left-button
          clicks at the same committed cursor position and does not reopen the
          main grid between clicks
        - focused-monitor targeting works with a non-zero virtual-layout origin
        - grid and pointer targeting remain correct with scale != 1.0
        - Escape exits without clicking and overrides stay_active

        The tests must assert trace/event sequences, not just "no error". Include
        coordinates, monitor/output names, click counts, overlay show/hide counts,
        and relevant renderer snapshot hashes in failure output so an unattended
        agent can diagnose regressions.
