    - id: headless-prd-acceptance-suite
      title: Add headless PRD acceptance suite with trace assertions
      details: |
        Build deterministic end-to-end acceptance tests through the
        daemon/controller layer using fakes. These tests are required for every
        run, but they do not replace the real Hyprland smoke checkpoint.

        Cover:
        - show displays the 26x26 grid on the focused monitor and grabs keyboard
        - grid/label style and alpha requirements are visible in snapshots
        - two coordinate letters plus Space completes a left click in 3-5
          keystrokes after the timeout
        - Shift-space emits only right click
        - Space Space emits double click at the same position with no main-grid
          reopen between button events
        - selected-cell outline remains after coordinate entry
        - hidden H/J/K/L and arrow movement can leave the selected cell and clamps
          at monitor edges
        - held direction repeat delays, accelerates, emits one target per tick,
          and stops on release
        - overlay unmaps before pointer button events
        - focused-monitor targeting works with offset, negative-origin, and scaled
          monitors
        - Escape exits without click and overrides stay_active

        Failure output must include structured trace data for overlay lifecycle,
        keyboard lifecycle, cursor targets, button events, timers, output names,
        and renderer hashes.
      status: done
      workflow: implement
      deps:
        - multi-output-scaling-and-alpha-regression
        - test-harness-and-observability
      context_files:
        - PRD.md
      acceptance:
        - A named headless acceptance suite covers every automated PRD acceptance check that does not require a live compositor.
        - Tests assert trace/event sequences, not just no-error completion.
        - Double-click acceptance asserts no main-grid reopen between the two click button sequences.
        - Click acceptance asserts overlay_unmapped_for_click precedes pointer button events.
        - Held-repeat acceptance uses fake clock and checks acceleration tiers and release stop.
        - Scaled and offset monitor cases use deterministic fixtures.
        - Running "go test ./..." runs the headless acceptance suite by default.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add headless PRD acceptance suite
    - id: systemd-user-unit
      title: Add mousekeys.service systemd user unit and install checks
      details: |
        Provide a packaged "mousekeys.service" user unit:
        - starts "mousekeys daemon" through /usr/bin/env
        - Restart=on-failure
        - logs to the user journal through stderr
        - fails fast when XDG_RUNTIME_DIR, WAYLAND_DISPLAY, or
          HYPRLAND_INSTANCE_SIGNATURE are unavailable
        - documented as a user unit, not a system unit

        The real smoke harness depends on this task and must verify that the
        restarted user service is running the rebuilt installed binary rather
        than a stale daemon left over from a previous build.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
        - ipc-socket-and-toggle
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Repository contains "mousekeys.service" with Restart=on-failure and required-env guard.
        - Unit references the installed "mousekeys daemon" command and is documented as a user unit.
        - Install, enable, restart, journal, and disable steps are documented or stubbed for docs-hyprland-and-install.
        - status output includes enough version/build/binary information for the smoke harness to detect stale service state.
        - systemd-analyze --user verify mousekeys.service is run when available, with unrelated environment warnings documented in task notes.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
        - if command -v systemd-analyze >/dev/null; then systemd-analyze --user verify mousekeys.service; else echo "systemd-analyze not found; document this in task notes"; fi
      commit_message: Add systemd user unit and install checks
    - id: docs-hyprland-and-install
      title: Document Hyprland keybind, autostart, install, config, and smoke checks
      details: |
        Author user-facing docs for:
        - Hyprland 0.55+ Lua keybind:
          hl.bind("SUPER + period", hl.dsp.exec_cmd("mousekeys show"))
        - legacy hyprlang:
          bind = SUPER, period, exec, mousekeys show
        - optional Omarchy bindd form if useful
        - optional autostart only when not using the systemd user unit
        - systemd user unit install/enable/restart/journal/disable steps
        - UWSM or equivalent environment import requirement
        - default config.toml with Space, Shift-space, and Space Space defaults
        - note that existing config files are not rewritten when defaults change
        - v1 non-goals
        - troubleshooting stale installed daemon, keyboard focus/keymap failures,
          and overlay shown but click not reaching the app

        Docs should clearly say the global trigger hotkey lives in Hyprland
        config, not in mousekeys config.
      status: done
      workflow: implement
      deps:
        - config-toml-loader
        - ipc-socket-and-toggle
        - systemd-user-unit
      context_files:
        - PRD.md
        - README.md
      acceptance:
        - README covers Hyprland 0.55+ Lua keybind and legacy hyprlang keybind.
        - README includes optional autostart blocks for Lua and legacy hyprlang.
        - README documents systemd user service install, restart, journal, and disable steps.
        - README documents current default config with left_click="space", right_click="Shift-space", and double_click="space space".
        - README documents v1 non-goals and troubleshooting for stale service, focus/keymap, and click-delivery issues.
        - Global trigger exclusion from config is explicit.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - test -f README.md
        - grep -F 'hl.bind("SUPER + period", hl.dsp.exec_cmd("mousekeys show"))' README.md
        - grep -F 'bind = SUPER, period, exec, mousekeys show' README.md
        - grep -F 'left_click = "space"' README.md
        - grep -F 'right_click = "Shift-space"' README.md
      commit_message: Document Hyprland integration, install, config, and troubleshooting
    - id: real-hyprland-smoke-harness
      title: Add installed-service real Hyprland smoke harness
      details: |
        Add a checked-in smoke script or Go test helper that can run in a live
        Hyprland session and verify behavior fakes cannot prove. The harness
        must be explicit about prerequisites and must fail the checkpoint when a
        live session is available but the smoke cannot run successfully.

        Required smoke flow when Hyprland is available:
        - build the binary intended for installation
        - install it to the documented PATH location, or to an explicit
          MOUSEKEYS_INSTALL_PATH understood by the service and docs
        - restart "mousekeys.service" as a systemd user service
        - assert "mousekeys status" reports the expected pid and version/build id
          for the rebuilt installed binary
        - open the overlay through "hyprctl dispatch exec 'mousekeys show'" and,
          where possible, through the configured keybind path
        - inject representative keys such as M K Space using an available test
          input tool, not as a product dependency
        - assert "hyprctl cursorpos" moves to the selected cell and click traces
          show overlay unmap before pointer button events
        - repeat after hide/show/show and after service restart
        - repeat with Chrome/Chromium focused when available; otherwise document
          why that subcase was unavailable

        If no live Hyprland session is detectable, the harness may report a
        structured skip. The final checkpoint must treat skips differently from
        passes and must require the smoke when the session exists.
      status: todo
      workflow: implement
      deps:
        - click-commit-actions
        - systemd-user-unit
        - docs-hyprland-and-install
        - headless-prd-acceptance-suite
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Repository contains a repeatable real-session smoke harness with clear prerequisite checks.
        - Harness verifies rebuilt installed binary, restarted user service, IPC entry, overlay keyboard focus, keymap translation, cursor motion, and overlay-unmap-before-click.
        - Harness repeats show/hide/show and service restart cases.
        - Harness includes Chrome/Chromium-focused flow when available and records explicit unavailable reason otherwise.
        - Harness distinguishes pass, fail, and no-session skip in machine-readable output.
        - Task notes document the exact command used and observed result.
      verify_commands:
        - go build ./...
        - go test ./...
        - test -x scripts/smoke_real_hyprland.sh || test -x .vibedrive/smoke_real_hyprland.sh
      commit_message: Add installed-service Hyprland smoke harness
