        - When create_virtual_pointer_with_output is available, pointer motion is mapped to the focused output without manual offset.
        - Fallback path adds the focused monitor's virtual origin offset and is exercised in tests.
        - Grid lines and edge labels remain correctly aligned on a scaled monitor using snapshot tests.
        - Optional manual verification steps for a multi-monitor + scaled setup are documented in the task notes; automated tests remain the required gate.
