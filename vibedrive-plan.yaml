      details: |
        This task hardens the project against the multi-monitor and scaling
        acceptance gates the PRD calls out for v1, even though multi-monitor
        selection / spanning is out of scope.

        - Pointer motion targets the focused monitor's output coordinate space
          when create_virtual_pointer_with_output is available.
        - Fallback code explicitly accounts for the focused monitor's
          virtual-layout origin so absolute pointer motion lands on the focused
          monitor in multi-monitor setups with non-zero origins.
        - Grid renders correctly on a scaled monitor (grid is computed in
          logical pixels; Wayland buffer scaling handles physical density).
        - Multi-monitor selection / spanning remains out of scope and is
          documented as such.

        Add deterministic unit tests for the coordinate transforms
        (logical-to-buffer, logical-to-virtual-layout) covering scaled and
        offset monitors. Use the fake monitor/output fixtures and renderer
        snapshots as the required gate. Document optional manual verification on
        a real Hyprland session with a non-zero-origin focused monitor and a
        scaled monitor when such an environment is available, but absence of that
        environment must not block the task.

        A standalone task is justified here because this work cuts across
        previously-shipped pointer and overlay code, depends on rare
        multi-monitor environments to validate, and protects two distinct PRD
        acceptance gates (non-zero origin and scaled monitor) — broader risk
        surface than any single earlier impl task.
