project:
    name: mousekeys
    objective: Rebuild a keyboard-driven mouse control utility for Arch Linux + Hyprland that overlays a labeled grid and synthesizes pointer input via Wayland.
    source_docs:
        - IDEA.md
        - PRD.md
        - PRD_additions.md
        - .vibedrive/task-notes.yaml
    constraint_files:
        - PRD.md
tasks:
    - id: bootstrap-cli-skeleton
      title: Bootstrap Go module, CLI skeleton, version reporting, and structured logging
      details: |
        Initialize a Go module named "mousekeys" at the repo root. Create one
        binary with subcommands "daemon", "show", "hide", and "status" wired
        through stdlib flag parsing or a small local router.

        The daemon is a persistent process. Client commands are short lived and
        will be wired to IPC in ipc-socket-and-toggle. Add version/build metadata
        to the binary and include it in "mousekeys status" once IPC exists, so a
        real installed service can prove it is running the just-built binary.

        Wire structured stderr logging with "info" by default and "debug" via
        MOUSEKEYS_LOG=debug. The daemon must validate XDG_RUNTIME_DIR,
        WAYLAND_DISPLAY, and HYPRLAND_INSTANCE_SIGNATURE at startup and fail with
        clear journal-friendly errors when launched outside a Hyprland Wayland
        session.
      status: done
      workflow: implement
      context_files:
        - PRD.md
        - IDEA.md
      acceptance:
        - Repo contains a valid go.mod for module name "mousekeys" with a Go version compatible with current Arch Linux.
        - Build via "go build ./..." succeeds, and "go build -o .vibedrive/tmp/mousekeys ." produces a runnable binary.
        - Running the binary with "--help" lists daemon, show, hide, and status.
        - The mousekeys daemon command exits with a clear error when required Hyprland session env vars are missing and stays running otherwise.
        - Logger writes to stderr, defaults to info, and switches to debug when MOUSEKEYS_LOG=debug is set.
        - Binary exposes version/build metadata for later stale-service detection.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - mkdir -p .vibedrive/tmp && go build -o .vibedrive/tmp/mousekeys .
        - go build ./...
        - go vet ./...
        - go test ./...
      commit_message: Bootstrap Go module, CLI skeleton, logging, and version reporting
    - id: test-harness-and-observability
      title: Add deterministic test harness and trace instrumentation
      details: |
        Add the testing and observability foundation before protocol-heavy work.
        Introduce small internal interfaces for focused-monitor lookup, Wayland
        overlay backend, keyboard event source, pointer synthesis, renderer
        buffer sink, installed-service status, and clock/timer source.

        Provide deterministic fakes/helpers:
        - fake Hyprland IPC responder with focused-monitor fixtures, including
          non-zero and negative virtual-layout origins and scale != 1.0
        - fake Wayland registry/output/backend that records surface create,
          configure, render, keyboard-grab, unmap/destroy, output-change, and
          compositor-close events
        - keyboard event fakes for keymap fd delivery, enter/leave/destroy,
          key press/release, modifiers, compositor repeat, and show/hide/show
          reuse
        - virtual-pointer recorder for motion, frame, button down/up,
          double-click grouping, coordinates, output name, and timestamps
        - fake clock/timer source for double-click and held-direction repeat
        - straight-ARGB snapshot/hash helpers plus Wayland-upload
          premultiplication checks
        - JSONL trace recorder enabled in tests and by MOUSEKEYS_TRACE_JSONL

        Headless fakes are required, but they are not the final release gate.
        The later real-hyprland-smoke-harness task must cover installed-service
        and compositor behavior that fakes cannot prove.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Tests can exercise daemon state, geometry, renderer buffers, keyboard lifecycle, pointer output, timers, and service status without a real Hyprland session.
        - Fake monitor fixtures include scale != 1.0, non-zero origins, and negative virtual-layout origins.
        - Keyboard fakes can reproduce keymap fd offset/EOF cases, enter/leave/destroy reset, modifier chords, compositor repeat, and show/hide/show reuse.
        - Pointer recorder exposes enough structured events to assert click counts, coordinates, output names, event order, and no main-grid reopen during double-click.
        - Renderer helpers distinguish straight ARGB internal pixels from premultiplied Wayland-upload pixels.
        - Trace recorder includes overlay lifecycle, keyboard lifecycle, pointer events, timer transitions, click grouping, and stay-active resets.
        - A passing stub end-to-end test demonstrates the fakes and trace recorder.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add deterministic test harness and trace instrumentation
    - id: config-toml-loader
      title: Add TOML config loader with current defaults
      details: |
        Implement loading of "~/.config/mousekeys/config.toml" with first-start
        default creation. Use XDG config semantics so tests set XDG_CONFIG_HOME
        to a temporary directory and never write to the real home directory.

        Defaults must match PRD.md exactly:
        - grid.size = 26
        - grid.subgrid_pixel_size = 5
        - keybinds.left_click = "space"
        - keybinds.right_click = "Shift-space"
        - keybinds.double_click = "space space"
        - keybinds.exit = "Escape"
        - keybinds.backspace = "BackSpace"
        - behavior.stay_active = true
        - behavior.double_click_timeout_ms = 250
        - appearance.grid_opacity = 0.4
        - appearance.grid_line_width = 1
        - appearance.label_font_size = 14

        Key names use xkbcommon keysym names. The optional "Shift-" prefix is a
        modifier chord, not a sequence token. Multi-key sequences such as
        "space space" are space-separated tokens. The global Hyprland trigger is
        not part of this config.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
        - test-harness-and-observability
      context_files:
        - PRD.md
      acceptance:
        - Daemon creates default config.toml when missing on first start.
        - Tests use temporary XDG_CONFIG_HOME and do not touch the real home directory.
        - Loading an existing config applies user values and defaults missing fields.
        - Shift-space parses as one shifted-key chord and cannot start or complete a space space double-click.
        - Invalid values and invalid key names are rejected with clear errors.
        - Unit tests cover default generation, missing-field defaulting, invalid rejection, key sequence parsing, and shifted chord parsing.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add TOML config loader with current defaults
    - id: ipc-socket-and-toggle
      title: Add Unix-socket IPC with show toggle, hide, and status
      details: |
        Implement newline-delimited JSON IPC over
        "$XDG_RUNTIME_DIR/mousekeys.sock". The daemon owns the socket on startup
        and removes it on clean shutdown. Client subcommands "show", "hide", and
        "status" connect to the socket and dispatch their commands.

        "show" displays the overlay when inactive and toggles it off when active,
        exactly like Escape cancel with no click. "hide" cancels any active
        overlay and is a no-op when inactive. "status" returns structured state:
        active/inactive, pid, version/build id, and enough binary/service details
        for the real smoke harness to detect a stale installed daemon.

        The daemon must refuse to start when another live daemon owns the socket,
        while safely removing stale sockets.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
        - test-harness-and-observability
      context_files:
        - PRD.md
      acceptance:
        - Daemon creates and owns "$XDG_RUNTIME_DIR/mousekeys.sock" while running and removes it on clean shutdown.
        - Integration tests set XDG_RUNTIME_DIR to a temporary directory and leave no socket files behind.
        - Two live daemons cannot run on the same socket path.
        - The mousekeys show command toggles an active overlay off without emitting pointer events.
        - The mousekeys hide command cancels any active overlay and is a no-op when inactive.
        - The mousekeys status command returns active state, pid, version/build id, and binary/service metadata.
        - Tests boot the daemon, send every IPC command, and assert responses and state transitions through a stub overlay.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add Unix-socket IPC with show toggle, hide, and status
    - id: hyprland-focused-monitor
      title: Query focused monitor from Hyprland IPC
      details: |
        Implement a Hyprland IPC client that queries the focused monitor at
        trigger time. Use HYPRLAND_INSTANCE_SIGNATURE to locate
        "$XDG_RUNTIME_DIR/hypr/<sig>/.socket.sock" and query "j/monitors".

        Return a typed monitor struct: name, virtual-layout x/y origin, logical
        width/height, physical dimensions if available, and scale. Normalize
        Hyprland pixel dimensions plus scale to logical monitor size. Preserve
        non-zero and negative virtual origins for downstream pointer fallback.

        Handle missing env vars, missing socket, malformed JSON, and no focused
        monitor with errors that include useful context.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
        - test-harness-and-observability
      context_files:
        - PRD.md
      acceptance:
        - Hyprland IPC client returns the focused monitor with name, origin, logical size, physical size when available, and scale.
        - Logical size normalization from Hyprland pixels and scale is covered by tests.
        - Errors are wrapped with context for missing env, unreachable socket, malformed response, and no focused monitor.
        - Fake Unix-socket tests cover success and failure paths, including offset, negative-origin, and scaled focused monitors.
        - Optional real smoke notes compare output with "hyprctl -j monitors"; final real behavior is gated later by real-hyprland-smoke-harness.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add Hyprland IPC focused-monitor query
    - id: wayland-client-base
      title: Establish reproducible Wayland client base and protocol bindings
      details: |
        Add a direct Wayland client that connects through $WAYLAND_DISPLAY and
        binds wl_compositor, wl_shm, wl_seat, wl_keyboard, wl_pointer as needed,
        wl_output, wlr-layer-shell, and wlr-virtual-pointer-unstable-v1.

        Choose and document a reproducible Go Wayland binding/code-generation
        strategy. Pin modules and check in protocol XMLs/generated bindings for
        wlroots layer-shell and virtual-pointer. The task is incomplete if
        protocol availability depends on an unrecorded system file, hand-edited
        generated code, or local generator state.

        Enumerate outputs by compositor output name and match them to the
        Hyprland-focused monitor. Use wl_output name events when available and
        zxdg-output information when needed. Shared client state must be
        concurrency-safe, and roundtrips/event waits need deadlines so tests and
        the daemon cannot hang indefinitely.
      status: done
      workflow: implement
      deps:
        - bootstrap-cli-skeleton
        - test-harness-and-observability
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Client connects to $WAYLAND_DISPLAY and binds required core, layer-shell, and virtual-pointer globals.
        - Required protocol XMLs/generated bindings are reproducible from committed files or pinned modules.
        - Output enumeration exposes name, logical position, logical size, and scale and matches Hyprland monitor names.
        - Missing socket and missing required globals produce clear errors.
        - Registry orchestration, xdg-output events, seat capability failures, output matching, and deadline cancellation are covered by headless tests.
        - Shared client state is race-safe under "go test -race" for the relevant tests.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go test -race ./...
        - go vet ./...
      commit_message: Add reproducible Wayland client base
    - id: renderer-font-alpha-and-grid-style
      title: Add deterministic renderer, font atlas, alpha upload, and grid style
      details: |
        Build the software renderer used by the layer-shell overlay. Prefer a
        bundled pre-baked bitmap atlas unless there is a strong reason to use
        FreeType; document the choice in task notes. Avoid GTK and avoid
        unnecessary cgo/native dependencies.

        Renderer requirements:
        - internal composition uses straight ARGB for deterministic snapshots
        - Wayland wl_shm upload premultiplies alpha
        - A-Z glyphs plus HUD characters are cached once, not rasterized on the
          hot show path
        - grid lines use a translucent bluish core stroke and dark-blue halo
        - edge labels use green-tinted foreground plus dark outline/halo
        - empty cells stay transparent, with no opaque panel or label boxes
        - appearance.grid_opacity controls visible line strength
        - appearance.grid_line_width controls core stroke width, with derived halo
      status: done
      workflow: implement
      deps:
        - config-toml-loader
        - test-harness-and-observability
      context_files:
        - PRD.md
        - PRD_additions.md
      acceptance:
        - Renderer returns deterministic straight-ARGB buffers and stable snapshot hashes.
        - Wayland upload path premultiplies alpha and is tested separately from straight-ARGB snapshots.
        - Semi-transparent strokes do not become solid white in premultiplied upload tests.
        - Glyph atlas covers A-Z plus HUD characters at configured label and HUD sizes and is cached.
        - Grid strokes use bluish core plus dark halo; labels use green foreground plus dark halo.
        - Snapshot tests verify transparency between strokes/labels on light and dark background composites.
        - Choice of font strategy is documented in task notes with reasons.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add deterministic renderer, font atlas, alpha upload, and grid style
    - id: wlr-layer-shell-overlay
      title: Render exclusive layer-shell overlay with robust lifecycle handling
      details: |
        Implement wlr-layer-shell overlay surfaces on the focused monitor. Use a
        top-layer surface anchored to the focused monitor's logical area with
        keyboard_interactivity=exclusive. The cursor remains visible.

        Lifecycle requirements learned from the previous pass:
        - create on show and destroy/unmap on hide, toggle, Escape, compositor
          close, and click-unmap handoff
        - recover cleanly after compositor-initiated close
        - do not drop configure, keymap, keyboard, error, release, output-change,
          or destroy events under normal load
        - nil-safe destroy/release paths
        - recreate buffers on configure and scale/output changes
        - keep enough tracing to debug lifecycle and focus failures

        For this task, a placeholder render is acceptable; main grid drawing is
        wired in main-grid-coordinate-entry.
      status: done
      workflow: implement
      deps:
        - wayland-client-base
        - hyprland-focused-monitor
        - ipc-socket-and-toggle
        - renderer-font-alpha-and-grid-style
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Show creates a layer-shell surface anchored to the focused monitor with keyboard_interactivity=exclusive.
        - Hide and show-toggle destroy/unmap the surface cleanly and reset controller state.
        - Configure, release, output-change, compositor-close, and destroy paths are tested through the production surface path with fakes.
        - Event delivery is non-dropping for lifecycle and keyboard-critical events or produces a clear fatal error instead of silent loss.
        - Controller can show again after compositor close and after hide/show/show-toggle cycles.
        - Cursor remains visible while the overlay is active.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add robust layer-shell overlay lifecycle
    - id: wayland-keyboard-input
      title: Translate Wayland keyboard input with reliable keymap and lifecycle handling
      details: |
        Implement keyboard input while the overlay is active. Receive
        wl_keyboard events from the exclusive layer-shell surface, read the
        compositor-provided keymap, maintain xkb state, handle modifiers, and
        translate key presses into internal letter/command tokens.

        Lessons to bake in:
        - read keymap file descriptors reliably regardless of current fd offset;
          duplicate/seek/read-all as needed so EOF does not break xkb translation
        - keymap, enter, leave, destroy, modifier, and error events must not be
          silently dropped
        - keyboard leave/destroy/keymap reset must clear pressed bookkeeping and
          stop held-direction repeat
        - one wl_keyboard lifecycle must survive show/hide/show and overlay
          recreation
        - lowercase and shifted letters resolve to A-Z coordinate letters
        - Shift-space is a right-click chord, not a two-token sequence
        - compositor repeat must not create repeated command actions; only the
          app-controlled hidden-subcell repeat task moves while held
      status: done
      workflow: implement
      deps:
        - wayland-client-base
        - wlr-layer-shell-overlay
        - config-toml-loader
        - test-harness-and-observability
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - wl_keyboard key press events translate into internal letter and configured command tokens.
        - Keymap fd reading succeeds when the fd offset is at start and when the test simulates a non-zero offset/EOF-prone path.
        - Lowercase and shifted alphabetic input both resolve to A-Z coordinate letters.
        - Shifted chord matching handles "Shift-space" as a right-click chord and does not interact with "space space".
        - Releases do not trigger actions; compositor repeat does not trigger repeated command actions.
        - Enter/leave/destroy/keymap-reset paths clear pressed state and stop held-repeat bookkeeping.
        - Show/hide/show reuse is covered by tests with the same fake keyboard lifecycle.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add reliable Wayland keyboard input translation
    - id: wlr-virtual-pointer
      title: Synthesize pointer motion and clicks via wlr-virtual-pointer
      details: |
        Implement direct wlr-virtual-pointer-unstable-v1 synthesis. Prefer
        create_virtual_pointer_with_output when the compositor supports it and
        map to the focused monitor wl_output. Accept manager v1 for fallback.

        Expose internal APIs for MoveAbsolute(x, y logical, output), LeftClick,
        RightClick, and DoubleClick. Emit protocol-correct motion/frame and
        button/frame events. Fallback absolute motion must account for the
        focused monitor's virtual-layout origin, including non-zero and negative
        origins.

        No ydotool/uinput dependency is allowed for product input synthesis.
        External input tools may only appear in real smoke tests.
      status: done
      workflow: implement
      deps:
        - wayland-client-base
        - hyprland-focused-monitor
        - test-harness-and-observability
      context_files:
        - PRD.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Virtual-pointer client binds to the protocol and uses with-output creation when available.
        - Fallback path applies focused monitor virtual origin correctly for non-zero and negative origins.
        - MoveAbsolute, LeftClick, RightClick, and DoubleClick produce protocol-correct ordered events.
        - Recorder tests assert exact motion/frame/button ordering, click grouping, coordinates, and output names.
        - Unit tests cover manager v1 fallback and manager v2 with-output paths.
        - No ydotool/uinput product dependency is introduced.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add wlr-virtual-pointer synthesis
    - id: main-grid-coordinate-entry
      title: Render main grid and coordinate-entry FSM
      details: |
        Wire the renderer, overlay, keyboard input, and controller state for the
        main 26x26 coordinate flow.

        Requirements:
        - on "mousekeys show", render a 26x26 grid on the focused monitor only
        - cell bounds cover the full monitor in logical pixels with deterministic
          uneven division
        - edge labels A-Z render on all four edges only
        - HUD shows typed input such as "M_"
        - first letter selects horizontal column and dims/hides non-matching
          columns
        - second letter selects vertical row and emits a selected-cell event
        - Backspace removes the last coordinate letter
        - invalid keys are ignored
        - hide, toggle, Escape, compositor close, and show reset state cleanly
      status: done
      workflow: implement
      deps:
        - renderer-font-alpha-and-grid-style
        - wlr-layer-shell-overlay
        - wayland-keyboard-input
        - ipc-socket-and-toggle
      context_files:
        - PRD.md
      acceptance:
        - Grid renders 26x26 cells whose union covers exactly the focused monitor logical region.
        - Edge labels appear on top/bottom for columns and left/right for rows; interior cells are unlabeled.
        - HUD updates after each typed letter and Backspace.
        - First letter highlights the selected column and dims/hides other columns.
        - Second letter emits selected-cell coordinates and selected-cell bounds.
        - Invalid keys are ignored; Backspace and reset transitions are covered.
        - Renderer snapshots cover square, non-square, light-background, and dark-background composites.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Render main grid and coordinate-entry FSM
    - id: hidden-subcell-navigation-repeat
      title: Add selected-cell outline, hidden subcell navigation, and held-key repeat
      details: |
        Implement the post-coordinate movement phase from PRD.md.

        After the second main-grid letter:
        - move the cursor immediately to the center of the selected cell
        - hide the main grid
        - render only the selected-cell outline using the same core/halo style
        - do not render a visible sub-grid

        Hidden subcell counts per axis are
        min(26, max(1, round(main_cell_axis_size / subgrid_pixel_size))).
        H/Left, J/Down, K/Up, and L/Right move by hidden subcell steps.
        Movement can leave the selected cell and clamps only at focused-monitor
        edges.

        Implement app-controlled held-key repeat only for these direction keys:
        about 350 ms initial delay; 1 subcell/tick at 50 ms; sustained hold ramps
        monotonically to 2 at 35 ms, 3 at 25 ms, and 4 at 16 ms. Each repeat tick
        emits one pointer target for the final accelerated position. Releasing
        the key stops immediately. Pressing a different direction cancels the old
        repeat and starts a new delay/ramp.
      status: done
      workflow: implement
      deps:
        - main-grid-coordinate-entry
        - wlr-virtual-pointer
        - wayland-keyboard-input
        - config-toml-loader
        - test-harness-and-observability
      context_files:
        - PRD.md
        - PRD_additions.md
      acceptance:
        - Selected main-grid cell center move is emitted through the virtual pointer immediately after two coordinate letters.
        - Main grid is hidden and only the selected-cell outline remains visible.
        - Hidden subcell count formula is exact for both axes and covered by tests.
        - H/J/K/L and arrow keys move by hidden subcell steps and can move outside the selected cell until monitor edges.
        - Held-direction repeat starts after the delay, accelerates monotonically, emits one final target per tick, and stops on release.
        - Starting a different direction cancels the previous repeat and starts a new ramp.
        - Compositor repeat does not trigger duplicate letters, clicks, backspaces, exits, or command actions.
        - Tests use fake clock and pointer recorder with no real sleeps.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Add hidden subcell navigation and held-key repeat
    - id: click-commit-actions
      title: Wire click commit, double-click timing, overlay unmap, and stay-active
      details: |
        Implement PRD click behavior with configured keybindings:
        - Space performs a left click after the double-click timeout unless a
          second Space arrives within behavior.double_click_timeout_ms
        - Space Space within the timeout emits exactly two left-button clicks at
          the same committed cursor position
        - Shift-space performs a right click immediately as a shifted chord and
          does not start or complete the left-click double-click timer
        - Escape commits cursor position without clicking and exits
        - stay_active=true recreates the main grid after click; stay_active=false
          exits after one click

        Before any pointer button event, unmap or destroy the full-screen
        layer-shell overlay so compositor hit-testing delivers the click to the
        target application. Use a context/lifecycle path that is not canceled by
        keyboard-session teardown. Recreate the grid only after the click
        sequence completes when stay_active is true.
      status: done
      workflow: implement
      deps:
        - hidden-subcell-navigation-repeat
        - wlr-virtual-pointer
        - config-toml-loader
        - wayland-keyboard-input
        - wlr-layer-shell-overlay
        - test-harness-and-observability
      context_files:
        - PRD.md
        - PRD_additions.md
        - .vibedrive/task-notes.yaml
      acceptance:
        - Space starts a pending left-click timer; timeout emits one left click and then applies stay-active behavior.
        - Space Space within the timeout emits exactly two left-button clicks at the same position without main-grid reopen between button events.
        - Shift-space emits exactly one right click and no left-click timer or left click.
        - Escape exits without click and overrides stay_active.
        - Overlay unmap/destroy trace occurs before every pointer button event.
        - stay_active=true recreates the main grid only after click completion; stay_active=false exits after click.
        - Fake-clock tests cover timing, stale sequence prevention, stay-active branches, and no real sleeps.
        - Target-app click delivery risk is documented for the real smoke harness.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
        - go build ./...
        - go test ./...
        - go vet ./...
      commit_message: Wire click commit, overlay unmap, and stay-active behavior
    - id: multi-output-scaling-and-alpha-regression
      title: Harden focused-monitor targeting, scaling, and alpha behavior
      details: |
        Add cross-cutting regression tests for monitor transforms and renderer
        upload behavior:
        - with-output virtual pointer path remains monitor-local
        - fallback pointer path adds focused monitor virtual origin
        - non-zero and negative virtual origins are covered
        - grid and selected-cell outline are computed in logical pixels
        - Wayland buffers scale correctly for scale != 1.0
        - straight ARGB snapshots and premultiplied Wayland uploads stay distinct
        - halo/label style remains readable on light and dark backgrounds

        Multi-monitor spanning remains out of scope; this task verifies focused
        monitor correctness.
      status: done
      workflow: implement
      deps:
        - click-commit-actions
        - hyprland-focused-monitor
        - wlr-virtual-pointer
        - main-grid-coordinate-entry
        - hidden-subcell-navigation-repeat
        - renderer-font-alpha-and-grid-style
      context_files:
        - PRD.md
      acceptance:
        - Coordinate-transform tests cover scale != 1.0, non-zero origin, and negative origin.
        - with-output and fallback pointer paths are both asserted.
        - Grid and selected-cell outline snapshots remain aligned on scaled monitors.
        - Wayland upload tests prove premultiplied alpha is used and does not over-brighten translucent pixels.
        - Visual snapshot/composite tests cover both very light and very dark backgrounds.
        - Multi-monitor spanning remains documented as out of scope.
        - Leave task notes describing discoveries that matter if the plan is rerun from scratch.
      verify_commands:
