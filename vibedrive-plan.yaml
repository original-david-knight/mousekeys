        - Double-click acceptance asserts no main-grid reopen event occurs between the two click events.
        - Scaled and non-zero-origin monitor cases use deterministic fake fixtures and require no real compositor.
        - Failure output includes enough structured data for an AI agent to identify the failing coordinate, monitor, or event-order invariant.
        - Running go test ./... runs the headless acceptance suite by default.
